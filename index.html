<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">

<body>
    <hgroup>
        <h1>Animations & transitions</h1>
        <h2>Animations</h2>
    </hgroup>
    <section class="cube-section">
        <div class="perspective">
            <div class="cube">
              <div class="square square-front"></div>
              <div class="square square-back"></div>
              <div class="square square-right"></div>
              <div class="square square-left"></div>
              <div class="square square-top"></div>
              <div class="square square-bottom"></div>
            </div>
        </div>
    </section>
    <header>
        <h2>Transitions</h2>
    </header>
    <section class="flexed-buttons">
        <button class="button-1">Hover me</button>
        <button class="button-2">Hover me</button>
        <button class="button-3">Hover me</button>
        <button class="button-4">Hover me</button>
    </section>
